<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Library – StorySphere</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif;}

body{
min-height:100vh;
background-image:url("/ASSETS/IMAGES/light-bg.jpeg"); /* ✅ FIXED */
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#111;
padding-bottom:70px;
}

body.dark{background:#121212;color:#eee;}

.header{
height:60px;
background:#4B1B6D;
display:flex;
align-items:center;
gap:10px;
padding:0 20px;
color:white;
}

.back-arrow{font-size:22px;cursor:pointer;margin-right:6px;}

.header-left{display:flex;align-items:center;gap:10px;}

.header img{height:32px;}

.header-title{font-size:18px;font-weight:600;}

.page{padding:30px 40px;}

.book-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
margin-top:20px;
}

.book-card{
background:white;
border-radius:12px;
padding:10px;
cursor:pointer;
transition:.2s;
box-shadow:0 3px 12px rgba(0,0,0,.15);
}

body.dark .book-card{background:#1e1e1e;}

.book-card:hover{transform:scale(1.05);}

.book-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.book-title{margin-top:8px;font-size:14px;font-weight:600;}

.empty{margin-top:40px;opacity:.7;font-size:15px;}

.loading{margin-top:40px;font-size:15px;}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #ddd;
}

.nav-item{font-size:22px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">
<span class="back-arrow" onclick="goHome()">←</span>

<div class="header-left">
<img src="/ASSETS/IMAGES/LOGO.jpeg"> <!-- ✅ FIXED -->
<div class="header-title">StorySphere</div>
</div>
</div>

<div class="page">

<h2>My Library</h2>

<div id="libraryContainer" class="book-grid"></div>

<div id="emptyMsg" class="empty" style="display:none;">
No stories saved yet.
</div>

<div id="loadingMsg" class="loading">
Loading your library...
</div>

</div>

<div class="bottom-nav">
<div class="nav-item" onclick="goHome()">🏠</div>
<div class="nav-item" onclick="goSearch()">🔍</div>
<div class="nav-item" onclick="goLibrary()">📚</div>
<div class="nav-item" onclick="goWrite()">✍️</div>
<div class="nav-item" onclick="goNotifications()">🔔</div>
</div>

<script>

const API="http://127.0.0.1:5000";

/* SESSION CHECK */
async function checkSession(){
    try{
        const res=await fetch(API+"/api/me",{ credentials:"include" });
        if(!res.ok) window.location.assign("/login");
    }catch{
        window.location.assign("/login");
    }
}
checkSession();

/* BACK BUTTON FIX */
window.onpageshow = function(event) {
    if (event.persisted) {
        window.location.reload();
    }
};

/* THEME */
if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

/* LOAD LIBRARY */
async function loadLibrary(){

try{

const res=await fetch(API+"/api/library",{ credentials:"include" });

if(!res.ok){
document.getElementById("loadingMsg").innerText="Failed to load library";
return;
}

const books=await res.json();

const container=document.getElementById("libraryContainer");
const loading=document.getElementById("loadingMsg");
const empty=document.getElementById("emptyMsg");

loading.style.display="none";
container.innerHTML="";

if(!Array.isArray(books) || books.length===0){
empty.style.display="block";
return;
}

books.forEach(book=>{

const card=document.createElement("div");
card.className="book-card";

const img=book.cover_image
?API+"/uploads/covers/"+book.cover_image
:"/ASSETS/IMAGES/placeholder.png";

card.innerHTML=`
<img src="${img}">
<div class="book-title">${book.title}</div>
`;

card.onclick=()=>{
localStorage.setItem("current_story_id",book.id);
window.location.assign("/story-details");
};

container.appendChild(card);

});

}catch{
document.getElementById("loadingMsg").innerText="Failed to load library";
}

}

loadLibrary();

/* NAVIGATION (FINAL FIX) */

function goHome(){ window.location.assign("/reader-dashboard"); }
function goSearch(){ window.location.assign("/search"); }
function goLibrary(){ window.location.assign("/library"); }
function goNotifications(){ window.location.assign("/notifications"); }

function goWrite(){
fetch(API+"/api/me",{credentials:"include"})
.then(res=>res.json())
.then(data=>{
if(data.is_writer){
window.location.assign("/writer-dashboard");
}else{
window.location.assign("/register");
}
})
.catch(()=> window.location.assign("/register"));
}

</script>

</body>
</html>
