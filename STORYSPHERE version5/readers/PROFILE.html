<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Profile – StorySphere</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial;
}

body{
background-image:url("../ASSETS/IMAGES/light-bg.jpeg");
background-size:cover;
background-attachment:fixed;
padding-bottom:70px;
}

body.dark{
background:#121212;
color:white;
}

/* HEADER */

.header{
background:#4B1B6D;
height:60px;
display:flex;
align-items:center;
gap:10px;
padding:0 20px;
color:white;
}

.back-arrow{
font-size:22px;
cursor:pointer;
}

/* PROFILE TOP */

.profile-top{
text-align:center;
padding:30px 20px;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
cursor:pointer;
}

.name{
font-size:26px;
margin-top:10px;
font-weight:600;
}

.username{
opacity:.8;
margin-top:3px;
}

/* ABOUT */

.tabs{
display:flex;
justify-content:center;
/*background:#222;*/
padding:12px 0;
color:white;
}

.about{
padding:20px;
}

textarea{
width:100%;
height:100px;
border-radius:6px;
border:none;
padding:10px;
resize:none;
}

/* FOLLOWING */

.following{
padding:20px;
}

.follow-list{
display:flex;
gap:15px;
overflow-x:auto;
margin-top:10px;
}

.author{
text-align:center;
width:90px;
}

.author img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.author-name{
font-size:12px;
margin-top:5px;
}

/* NAV */

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #ccc;
}

.nav-item{
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">

<span class="back-arrow" onclick="goHome()">←</span>

<img src="../ASSETS/IMAGES/LOGO.jpeg" height="32">

<span>StorySphere</span>

</div>

<div class="profile-top">

<img id="profileImg" class="profile-img" src="../ASSETS/IMAGES/profile.png">

<input type="file" id="imgInput" hidden>

<div class="name" id="name"></div>

<div class="username" id="username"></div>

</div>

<div class="tabs">
<div>ABOUT</div>
</div>

<div class="about">

<textarea id="aboutText" placeholder="Tap here to add a description about yourself..."></textarea>

</div>

<div class="following">

<h3>Following</h3>

<div class="follow-list" id="followingList">
</div>

</div>

<div class="bottom-nav">

<div class="nav-item" onclick="goHome()">🏠</div>
<div class="nav-item" onclick="goSearch()">🔍</div>
<div class="nav-item" onclick="goLibrary()">📚</div>
<div class="nav-item" onclick="goWrite()">✍️</div>
<div class="nav-item" onclick="goNotifications()">🔔</div>

</div>

<script>

const API="http://127.0.0.1:5000";

/* LOAD PROFILE */

async function loadProfile(){

try{

const res = await fetch(API+"/api/profile",{credentials:"include"});

if(!res.ok){
window.location.href="../LOGIN.html";
return;
}

const user = await res.json();

document.getElementById("username").innerText = "@"+user.username;
document.getElementById("name").innerText = user.username;

if(user.profile_pic){
document.getElementById("profileImg").src =
API+"/uploads/profile_pics/"+user.profile_pic;
}

document.getElementById("aboutText").value = user.about || "";

}catch{

window.location.href="../LOGIN.html";

}

}

loadProfile();

/* PROFILE IMAGE CHANGE */

document.getElementById("profileImg").onclick=function(){

document.getElementById("imgInput").click();

};

document.getElementById("imgInput").onchange=function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("profileImg").src=e.target.result;

};

reader.readAsDataURL(file);

saveProfile();

};

/* SAVE PROFILE */

async function saveProfile(){

const about=document.getElementById("aboutText").value;

const file=document.getElementById("imgInput").files[0];

const form=new FormData();

form.append("about",about);

if(file){
form.append("profile_pic",file);
}

await fetch(API+"/api/profile/update",{
method:"POST",
credentials:"include",
body:form
});

}

/* SAVE ABOUT WHEN USER LEAVES FIELD */

document.getElementById("aboutText")
.addEventListener("blur",saveProfile);

/* NAVIGATION */

function goHome(){
location.href="reader_dashboard.html";
}

function goSearch(){
location.href="search.html";
}

function goLibrary(){
location.href="library.html";
}

function goNotifications(){
location.href="notifications.html";
}

function goWrite(){

fetch(API+"/api/me",{credentials:"include"})
.then(res=>res.json())
.then(data=>{

if(data.is_writer){
location.href="../WRITER_DASHBOARD.html";
}else{
location.href="../REGISTER.html";
}

});

}

</script>

</body>
</html>
